<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Verity - Verify Claims Instantly</title>
  <link rel="icon" href="/favicon.svg?v=6" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=6" />
  <link rel="shortcut icon" href="/favicon.ico?v=6" type="image/x-icon" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=6" />

  <!-- Icons and fonts -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="style.css?v=3" rel="stylesheet" />
  <script>
    // Apply saved or system theme before paint to avoid flash
    (function () {
      try {
        const stored = localStorage.getItem('verity-theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Default to dark mode for better aesthetic
        const theme = stored || (prefersDark ? 'dark' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {}
    })();
  </script>

  <!-- Three.js for WebGL Cloud -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <style>
    /* Prevent theme icon FOUC */
    .icon-btn i { visibility: hidden; }
  </style>
</head>
<body>
  <!-- Mystical Cloud UI Canvases -->
  <canvas id="webgl-cloud" class="webgl-cloud" style="pointer-events: none !important;"></canvas>
  <canvas id="particleCanvas" class="particle-canvas" style="pointer-events: none !important;"></canvas>

  <div class="app-wrapper">
    <header class="header">
      <div class="header-content">
        <div class="brand-badge">
          <img id="brandLogo" src="assets/AD_logo.png" alt="Logo" class="brand-logo" loading="eager" onerror="this.onerror=null; this.src='assets/logo.png';" />
        </div>

        <div class="brand">
          <svg class="brand-logo-svg" viewBox="0 0 90 40" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="silver-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="var(--logo-check-start)" />
                <stop offset="50%" stop-color="var(--logo-check-mid)" />
                <stop offset="100%" stop-color="var(--logo-check-end)" />
              </linearGradient>
            </defs>
            <!-- Left leg of V: Classic serif top, clean slanted stem, flat bottom cut at y=33 -->
            <path d="M 6 11 L 18 11 C 16.0 11, 14.0 12.1, 15 14 L 25 33 H 21.5 L 11.5 14 C 10.5 12.1, 9.0 11, 6 11 Z" fill="currentColor" />
            <!-- Right Leg (Checkmark): Starts exactly at the bottom joint of the left leg (23.25, 33) -->
            <path d="M 23.25 33 L 36.5 6.5" stroke="url(#silver-grad)" stroke-width="2.8" stroke-linecap="round" fill="none" />
            <!-- 'erity' text aligned for balanced kerning -->
            <text class="logo-text" x="38" y="31" fill="currentColor">erity</text>
          </svg>
        </div>

        <button id="themeToggle" class="icon-btn glass-btn" aria-label="Toggle theme" title="Toggle light/dark">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <main class="main-scrollable">
      <div class="content-container">
        
        <div id="welcomeSection" class="welcome-section">
          <h2>Seek the truth.</h2>
          <p>Verify claims, articles, and images with absolute precision.</p>
        </div>

        <div id="loadingSection" class="loading-section hidden">
          <div class="cloud-loading-overlay" id="cloudLoadingOverlay">
            <div class="thought-bubbles-container" id="thoughtBubbles">
              <!-- Thought bubbles injected by JS -->
            </div>
          </div>
        </div>

        <div id="resultsSection" class="results-section hidden">
          <div class="results-header">
            <h2>Analysis Complete</h2>
          </div>
          <div id="resultsContainer"></div>
        </div>
      </div>
    </main>

    <footer class="bottom-area">
      <div class="prompt-container floating-prompt">
        
        <div class="upload-section">
          <div id="imageDrop" class="dropzone" tabindex="0" role="button" aria-label="Upload image">
            <input id="imageInput" type="file" accept="image/*" hidden />
            <i class="fas fa-paperclip"></i>
          </div>
        </div>

        <div class="textarea-wrapper" id="textAreaWrapper">
          <div id="imagePreview" class="image-preview hidden"></div>
          <textarea
            id="textInput"
            class="prompt-input"
            placeholder="Enter a claim to verify, paste a link or drop an image..."
            rows="1"
          ></textarea>
        </div>

        <div class="action-buttons">
          <button id="clearBtn" class="icon-action-btn" title="Clear input">
            <i class="fas fa-eraser"></i>
          </button>
          <button id="factCheckBtn" class="submit-btn" title="Fact Check Now">
            <i class="fas fa-arrow-up"></i>
            <span class="btn-label hidden-label">Fact Check Now</span>
          </button>
        </div>

      </div>
      <div class="hint">
        <span>Powered by Advanced AI Models</span>
      </div>
    </footer>
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
