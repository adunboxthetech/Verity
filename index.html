<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>AI Fact Checker - Verify Claims Instantly</title>

  <!-- Icons and fonts -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="style.css?v=3" rel="stylesheet" />
  <script>
    // Apply saved or system theme before paint to avoid flash
    (function () {
      try {
        const stored = localStorage.getItem('ai-fc-theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Default to dark mode for better aesthetic
        const theme = stored || (prefersDark ? 'dark' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {}
    })();
  </script>

  <!-- Three.js for WebGL Cloud -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <style>
    /* Prevent theme icon FOUC */
    .icon-btn i { visibility: hidden; }
  </style>
</head>
<body>
  <!-- Mystical Cloud UI Canvases -->
  <canvas id="webgl-cloud" class="webgl-cloud" style="pointer-events: none !important;"></canvas>
  <canvas id="particleCanvas" class="particle-canvas" style="pointer-events: none !important;"></canvas>

  <div class="app-wrapper">
    <header class="header">
      <div class="header-content">
        <div class="brand">
          <div class="brand-badge">
            <img id="brandLogo" src="assets/AD_logo.png" alt="Logo" class="brand-logo" loading="eager" onerror="this.onerror=null; this.src='assets/logo.png';" />
          </div>
          <h1 class="app-title">AI Fact Checker</h1>
        </div>

        <button id="themeToggle" class="icon-btn glass-btn" aria-label="Toggle theme" title="Toggle light/dark">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <main class="main-scrollable">
      <div class="content-container">
        
        <div id="welcomeSection" class="welcome-section">
          <h2>Seek the Truth.</h2>
          <p>Fact-check claims, articles, or images with unparalleled accuracy.</p>
        </div>

        <div id="loadingSection" class="loading-section hidden">
          <div class="cloud-loading-overlay" id="cloudLoadingOverlay">
            <div class="thought-bubbles-container" id="thoughtBubbles">
              <!-- Thought bubbles injected by JS -->
            </div>
          </div>
        </div>

        <div id="resultsSection" class="results-section hidden">
          <div class="results-header">
            <h2>Analysis Complete</h2>
          </div>
          <div id="resultsContainer"></div>
        </div>
      </div>
    </main>

    <footer class="bottom-area">
      <div class="prompt-container floating-prompt">
        
        <div class="upload-section">
          <div id="imageDrop" class="dropzone" tabindex="0" role="button" aria-label="Upload image">
            <input id="imageInput" type="file" accept="image/*" hidden />
            <i class="fas fa-paperclip"></i>
          </div>
        </div>

        <div class="textarea-wrapper" id="textAreaWrapper">
          <div id="imagePreview" class="image-preview hidden"></div>
          <textarea
            id="textInput"
            class="prompt-input"
            placeholder="Enter a claim to verify, paste a link or drop an image..."
            rows="1"
          ></textarea>
        </div>

        <div class="action-buttons">
          <button id="clearBtn" class="icon-action-btn" title="Clear input">
            <i class="fas fa-eraser"></i>
          </button>
          <button id="factCheckBtn" class="submit-btn" title="Fact Check Now">
            <i class="fas fa-arrow-up"></i>
            <span class="btn-label hidden-label">Fact Check Now</span>
          </button>
        </div>

      </div>
      <div class="hint">
        <span>Powered by Advanced AI Models</span>
      </div>
    </footer>
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
